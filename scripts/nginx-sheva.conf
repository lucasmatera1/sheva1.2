# ===========================================================================
#  Sheva Platform – Nginx Reverse Proxy
#  Copie para: /etc/nginx/sites-available/sheva
#  Ative com:  ln -s /etc/nginx/sites-available/sheva /etc/nginx/sites-enabled/
#              nginx -t && systemctl reload nginx
#  Depois:     sudo certbot --nginx -d seu-dominio.com
# ===========================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=portal_limit:10m rate=50r/s;

upstream sheva_api {
    server 127.0.0.1:4013;
    keepalive 32;
}

upstream sheva_portal {
    server 127.0.0.1:3005;
    keepalive 16;
}

server {
    listen 80;
    server_name _;      # TODO: Trocar pelo dominio real antes de ir para producao

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # --- API ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://sheva_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts para requests longos (analytics)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Portal (Next.js) ---
    location / {
        limit_req zone=portal_limit burst=40 nodelay;

        proxy_pass http://sheva_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Next.js static assets ---
    location /_next/static/ {
        proxy_pass http://sheva_portal;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
